<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINESCOPE — Movie Search</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'cursive'],
            body:    ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            bg:      '#09090f',
            surface: '#111118',
            card:    '#18181f',
            border:  '#272736',
            accent:  '#e8c547',
            danger:  '#c4395e',
            muted:   '#64647a',
            light:   '#eeecea',
          },
          keyframes: {
            fadeUp:  { '0%': { opacity:'0', transform:'translateY(16px)' }, '100%': { opacity:'1', transform:'translateY(0)' } },
            shimmer: { '0%': { transform:'translateX(-100%)' }, '100%': { transform:'translateX(100%)' } },
            fadeIn:  { '0%': { opacity:'0', transform:'translateY(6px) scale(.97)' }, '100%': { opacity:'1', transform:'translateY(0) scale(1)' } },
          },
          animation: {
            fadeUp:  'fadeUp 0.4s ease both',
            shimmer: 'shimmer 1.5s infinite',
            fadeIn:  'fadeIn 0.18s ease both',
          },
        },
      },
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; font-weight: 300; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }

    .card-img { transition: transform 0.55s ease, filter 0.3s; filter: brightness(.85) saturate(.75); }
    .movie-card:hover .card-img { transform: scale(1.07); filter: brightness(1) saturate(1); }
    .card-overlay { opacity: 0; transition: opacity 0.3s; }
    .movie-card:hover .card-overlay { opacity: 1; }

    .shimmer-bar::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.045), transparent);
      animation: shimmer 1.5s infinite;
    }

    #modalBackdrop { transition: opacity 0.25s; }
    #modal { transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); max-height: 90vh; overflow-y: auto; }
    #modalBackdrop.open { opacity: 1; pointer-events: all; }
    #modalBackdrop.open #modal { transform: translateY(0); }

    #yearDropdown { animation: fadeIn 0.18s ease both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-ring { animation: spin 0.75s linear infinite; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #09090f; }
    ::-webkit-scrollbar-thumb { background: #272736; border-radius: 2px; }

    #searchInput:focus { outline: none; }
    #sentinel { height: 2px; }

    select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }

    /* Filter bar */
    #filterBar { transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
    #filterBar.open { max-height: 120px; opacity: 1; }
    .filter-input:focus { outline: none; border-color: #e8c547; }
    .filter-chip.active { background: #e8c547; color: #09090f; border-color: #e8c547; }
  </style>
</head>

<body class="bg-bg text-light min-h-screen overflow-x-hidden">

  <!-- STICKY HEADER -->
  <header class="sticky top-0 z-40 bg-bg/90 backdrop-blur-md border-b border-border">
    <div class="px-5 md:px-12 py-3 flex items-center gap-3 flex-wrap">

      <button onclick="resetToHome()" class="font-display text-3xl md:text-4xl tracking-widest leading-none shrink-0">
        Cine<span class="text-accent">scope</span>
      </button>

      <!-- Search bar -->
      <div class="flex flex-1 min-w-[180px] max-w-lg border border-border focus-within:border-accent transition-colors duration-200 bg-surface">
        <input id="searchInput" type="text" placeholder="Search films, series, episodes…" autocomplete="off"
               class="flex-1 bg-transparent px-4 py-2.5 text-sm text-light placeholder-muted tracking-wide"/>
        <button id="clearBtn" onclick="clearSearch()"
                class="hidden px-3 text-muted hover:text-light transition-colors text-base leading-none" title="Clear">✕</button>
        <button onclick="triggerSearch()"
                class="bg-accent hover:bg-yellow-300 transition-colors px-5 font-display text-base tracking-widest text-bg shrink-0">Go</button>
      </div>

      <!-- Sort (search mode only) -->
      <div id="sortWrap" class="hidden shrink-0 relative">
        <select id="sortSelect" onchange="onSortChange()"
                class="bg-surface border border-border text-muted text-xs tracking-widest uppercase px-3 py-2.5 pr-8 cursor-pointer hover:border-accent hover:text-light transition-colors"
                style="background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2364647a%22 stroke-width=%222.5%22><path d=%22M6 9l6 6 6-6%22/></svg>');background-repeat:no-repeat;background-position:right 8px center;background-size:12px">
          <option value="smart">★ Smart Sort</option>
          <option value="rating">Top Rated</option>
          <option value="year_desc">Newest First</option>
          <option value="year_asc">Oldest First</option>
          <option value="relevance">Most Relevant</option>
        </select>
      </div>

      <!-- Filter toggle button -->
      <button id="filterToggleBtn" onclick="toggleFilterBar()"
              class="shrink-0 flex items-center gap-2 border border-border hover:border-accent transition-colors px-4 py-2.5 text-xs tracking-widest uppercase text-muted hover:text-accent bg-surface">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M4 6h16M7 12h10M10 18h4"/>
        </svg>
        <span>Filters</span>
        <span id="filterCount" class="hidden bg-accent text-bg text-xs font-display px-1.5 leading-tight rounded-none">0</span>
      </button>

      <!-- Year picker -->
      <div class="relative shrink-0" id="yearPickerWrap">
        <button id="yearBtn" onclick="toggleYearPicker()"
                class="flex items-center gap-2 border border-border hover:border-accent transition-colors px-4 py-2.5 text-xs tracking-widest uppercase text-muted hover:text-accent bg-surface">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span id="yearLabel">All Years</span>
          <svg id="yearChevron" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>

        <div id="yearDropdown" class="hidden absolute right-0 top-full mt-2 bg-surface border border-border shadow-2xl z-50" style="width:272px">
          <div class="flex items-center justify-between px-4 py-3 border-b border-border">
            <button onclick="shiftDecade(-1)" class="text-muted hover:text-accent text-xl leading-none transition-colors px-1">‹</button>
            <span id="decadeLabel" class="font-display tracking-widest text-sm text-light"></span>
            <button onclick="shiftDecade(+1)"  class="text-muted hover:text-accent text-xl leading-none transition-colors px-1">›</button>
          </div>
          <div id="yearGrid" class="grid grid-cols-4 gap-1 p-3"></div>
          <div class="border-t border-border px-3 py-2">
            <button onclick="selectYear(null)" class="w-full text-xs tracking-widest uppercase text-muted hover:text-accent transition-colors py-1">Clear — All Years</button>
          </div>
        </div>
      </div>

    </div>

    <!-- FILTER BAR -->
    <div id="filterBar" class="border-t border-border bg-surface/60">
      <div class="px-5 md:px-12 py-3 flex flex-wrap gap-4 items-end">

        <!-- Type chips -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs tracking-widest uppercase text-muted">Type</span>
          <div class="flex gap-1.5">
            <button onclick="setTypeFilter('')"       id="typeAll"     class="filter-chip active text-xs tracking-widest uppercase px-3 py-1.5 border border-border transition-colors hover:border-accent">All</button>
            <button onclick="setTypeFilter('movie')"  id="typeMovie"   class="filter-chip text-xs tracking-widest uppercase px-3 py-1.5 border border-border text-muted transition-colors hover:border-accent hover:text-accent">Movie</button>
            <button onclick="setTypeFilter('series')" id="typeSeries"  class="filter-chip text-xs tracking-widest uppercase px-3 py-1.5 border border-border text-muted transition-colors hover:border-accent hover:text-accent">Series</button>
            <button onclick="setTypeFilter('episode')" id="typeEpisode" class="filter-chip text-xs tracking-widest uppercase px-3 py-1.5 border border-border text-muted transition-colors hover:border-accent hover:text-accent">Episode</button>
          </div>
        </div>

        <!-- Genre -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs tracking-widest uppercase text-muted">Genre</span>
          <div class="relative">
            <select id="genreSelect" onchange="setGenreFilter(this.value)"
                    class="filter-input bg-bg border border-border text-muted text-xs tracking-widest uppercase px-3 py-1.5 pr-8 cursor-pointer hover:border-accent hover:text-light transition-colors"
                    style="background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2364647a%22 stroke-width=%222.5%22><path d=%22M6 9l6 6 6-6%22/></svg>');background-repeat:no-repeat;background-position:right 8px center;background-size:12px">
              <option value="">All Genres</option>
              <option>Action</option><option>Adventure</option><option>Animation</option>
              <option>Biography</option><option>Comedy</option><option>Crime</option>
              <option>Documentary</option><option>Drama</option><option>Family</option>
              <option>Fantasy</option><option>History</option><option>Horror</option>
              <option>Music</option><option>Mystery</option><option>Romance</option>
              <option>Sci-Fi</option><option>Sport</option><option>Thriller</option>
              <option>War</option><option>Western</option>
            </select>
          </div>
        </div>

        <!-- Director -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs tracking-widest uppercase text-muted">Director</span>
          <input id="directorInput" type="text" placeholder="e.g. Nolan, Kubrick…"
                 oninput="setTextFilter('director', this.value)"
                 class="filter-input bg-bg border border-border text-light text-xs tracking-wide px-3 py-1.5 placeholder-muted transition-colors w-40"/>
        </div>

        <!-- Actor -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs tracking-widest uppercase text-muted">Actor</span>
          <input id="actorInput" type="text" placeholder="e.g. Pacino, Streep…"
                 oninput="setTextFilter('actor', this.value)"
                 class="filter-input bg-bg border border-border text-light text-xs tracking-wide px-3 py-1.5 placeholder-muted transition-colors w-40"/>
        </div>

        <!-- Min Rating -->
        <div class="flex flex-col gap-1.5">
          <span class="text-xs tracking-widest uppercase text-muted">Min Rating</span>
          <div class="relative">
            <select id="ratingSelect" onchange="setRatingFilter(this.value)"
                    class="filter-input bg-bg border border-border text-muted text-xs tracking-widest uppercase px-3 py-1.5 pr-8 cursor-pointer hover:border-accent hover:text-light transition-colors"
                    style="background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2364647a%22 stroke-width=%222.5%22><path d=%22M6 9l6 6 6-6%22/></svg>');background-repeat:no-repeat;background-position:right 8px center;background-size:12px">
              <option value="">Any</option>
              <option value="9">★ 9+</option>
              <option value="8">★ 8+</option>
              <option value="7">★ 7+</option>
              <option value="6">★ 6+</option>
              <option value="5">★ 5+</option>
            </select>
          </div>
        </div>

        <!-- Clear all filters -->
        <button onclick="clearAllFilters()" class="text-xs tracking-widest uppercase text-muted hover:text-danger transition-colors py-1.5 self-end ml-auto">
          Clear Filters
        </button>

      </div>
    </div>
  </header>

  <!-- HERO -->
  <div id="hero" class="px-5 md:px-12 pt-14 pb-8">
    <p class="text-muted text-xs tracking-widest uppercase mb-3">Top Rated · Curated · Now Loading</p>
    <h2 class="font-display text-5xl md:text-8xl tracking-widest leading-none">
      What's on <span class="text-accent">tonight?</span>
    </h2>
    <p class="text-muted text-sm tracking-wide mt-3 max-w-xs leading-relaxed">
      Sorted by IMDb rating &amp; recency. Search or filter above.
    </p>
  </div>

  <!-- STATUS -->
  <p id="status" class="px-5 md:px-12 pb-3 text-xs tracking-widest uppercase text-muted min-h-5"></p>

  <!-- GRID -->
  <main id="grid" class="grid gap-0.5 px-5 md:px-12 pb-6"
        style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr))"></main>

  <div id="sentinel"></div>

  <div id="spinner" class="hidden py-10 flex justify-center">
    <div class="spinner-ring w-5 h-5 border-2 border-border border-t-accent rounded-full"></div>
  </div>

  <!-- MODAL -->
  <div id="modalBackdrop"
       class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none"
       onclick="backdropClose(event)">
    <div id="modal" class="bg-surface border border-border w-full max-w-3xl grid md:grid-cols-[240px_1fr] relative translate-y-6">
      <button onclick="closeModal()"
              class="absolute top-3 right-3 z-10 w-8 h-8 flex items-center justify-center border border-border text-muted hover:text-light hover:border-light transition-colors bg-bg text-sm">✕</button>
      <div id="modalPoster" class="relative overflow-hidden min-h-[240px] md:min-h-0"></div>
      <div id="modalBody"   class="p-7 flex flex-col gap-4 overflow-y-auto" style="max-height:90vh"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
